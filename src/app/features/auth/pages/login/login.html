<div class="login-container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card p-4 shadow-lg border-0 style-login-card text-white">
    
    <div class="text-center mb-4">
      <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
        <i class="bi bi-building-fill text-info fs-3"></i>
        <h4 class="m-0 fw-bold tracking-wide">VozUrbana</h4>
      </div>
      <hr class="border-secondary-subtle my-3">
      <h5 class="text-white-50 fw-normal fs-6">Autenticación de Usuarios Municipales</h5>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-3">
        <label for="username" class="form-label small text-uppercase fw-semibold text-white-50">Usuario</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-person-fill"></i>
          </span>
          <input 
            type="text" 
            id="username" 
            formControlName="username"
            class="form-control" 
            placeholder="Ingrese su username"
            [class.is-invalid]="isFieldInvalid('username')">
        </div>
        <div class="invalid-feedback" *ngIf="isFieldInvalid('username')">
          El nombre de usuario es obligatorio.
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label small text-uppercase fw-semibold text-white-50">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-lock-fill"></i>
          </span>
          <input 
            type="password" 
            id="password" 
            formControlName="password"
            class="form-control" 
            placeholder="••••••••"
            [class.is-invalid]="isFieldInvalid('password')">
        </div>
        <div class="invalid-feedback" *ngIf="isFieldInvalid('password')">
          La contraseña debe tener al menos 6 caracteres.
        </div>
      </div>

      <button 
        type="submit" 
        [disabled]="loginForm.invalid" 
        class="btn btn-info w-100 fw-bold text-uppercase py-2 shadow-sm text-dark">
        Ingresar
      </button>

      <div class="text-center mt-3">
        <a href="#" class="text-info text-decoration-none small hover-opacity-100">¿Olvidó su contraseña?</a>
      </div>

    </form>
  </div>
</div>
