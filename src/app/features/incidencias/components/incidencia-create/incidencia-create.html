<div class="container-fluid py-4 position-relative">
  <h3 class="text-center text-white mb-4 fw-light tracking-wide">Reportar Nueva Incidencia</h3>

  <div class="card border-0 shadow-lg style-table-card mx-auto" style="max-width: 600px;">
    <div class="card-header border-bottom border-secondary pt-4 pb-3 px-4 bg-transparent">
      <h5 class="mb-1 text-white fw-normal">Formulario de Registro</h5>
      <p class="m-0 text-white-50 small">Adjunte la descripción y la evidencia fotográfica del suceso.</p>
    </div>

    <div class="card-body p-4">
      <form [formGroup]="crearForm" (ngSubmit)="onSubmit()">
        
        <div class="mb-4">
          <label class="form-label text-white-50 small">Descripción del Problema</label>
          <textarea 
            class="form-control bg-dark text-white border-secondary shadow-none" 
            formControlName="descripcion" 
            rows="3"></textarea>
        </div>

        <div class="mb-5">
          <label class="form-label text-white-50 small">Evidencia Fotográfica (Obligatorio)</label>
          <input 
            type="file" 
            class="form-control bg-dark text-white border-secondary shadow-none" 
            (change)="onFileSelected($event)" 
            accept="image/*">
        </div>

        <div class="d-flex gap-3 justify-content-end border-top border-secondary pt-4">
          <button type="button" class="btn btn-outline-light px-4" (click)="cancelar()">Cancelar</button>
          
          <button type="submit" class="btn style-btn-orange fw-bold px-4" [disabled]="crearForm.invalid || !archivoCapturado || isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            {{ isLoading ? 'GUARDANDO...' : 'REGISTRAR INCIDENCIA' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
